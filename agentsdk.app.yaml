kind: app
name: "agentruntime"
description: Local agentruntime app with searchable repository documentation.
default_agent:
  name: default
distribution:
  name: agentruntime
  title: Agent Runtime
  build:
    assets:
      - agentsdk.app.yaml
      - docs/**/*.md
      - README.md
      - AGENTS.md
      - CHANGELOG.md
    docker: {}
semantic_search:
  enabled: true
  embeddings:
    provider: axon
  store:
    kind: json
    path: .agents/index/datasources.json
  defaults:
    chunking:
      target_tokens: 350
      overlap_tokens: 50
    retrieval:
      mode: hybrid
      limit: 8
datasource:
  index:
    concurrency: 4
    freshness: 15m
  datasources:
    - name: local-docs
      kind: filesystem
      entities:
        - file.document
      description: Markdown documentation from this repository, including docs and root-level docs.
      path: .
      include: ["*.md", "*.markdown"]
      semantic:
        enabled: true
        entities:
          file.document:
            chunking:
              target_tokens: 350
              overlap_tokens: 50
            retrieval:
              mode: hybrid
              limit: 8
daemon:
  listeners:
    - name: local
      type: http
      addr: "coder-rewrite.sock"
      auth:
        mode: local_socket
  channels:
    - name: local
      type: direct
      listener: local
      session: default
      access:
        mode: open
---
kind: session
name: default
agent: default
---
kind: agent
name: default
tools:
  - datasource_search
context:
  - datasource.catalog
  - datasource.detected
datasources:
  - local-docs
system: |
  You are a helpful assistant for this local agentruntime app. Use
  datasource_search when answering questions about repository documentation or
  markdown files in this checkout, especially under `docs/`. Answer by
  summarizing relevant details and cite file paths. Do not reproduce full
  documents unless the user explicitly asks for verbatim content.
