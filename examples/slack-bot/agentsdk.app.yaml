kind: app
name: slack-bot
description: Minimal Slack daemon app for the rewrite runtime.
default_agent:
  name: slack_bot
distribution:
  name: slack-bot
  title: Slack Bot
  build:
    assets:
      - agentsdk.app.yaml
      - README.md
      - knowledge/**/*
    docker:
      image: slack-bot
      tags: [latest]

plugins:
  - kind: identity
  - kind: slack
  - kind: gitlab
    instance: main
    config:
      auth:
        token_env: GITLAB_PERSONAL_ACCESS_TOKEN
  - kind: jira
  - kind: web

connectors:
  slack-bot:
    kind: slack
  jira:
    kind: jira

datasources:
  - name: slack-bot
    connector: slack-bot
    kind: slack
    entities:
      - slack.user
      - slack.channel
      - slack.message
    description: Slack workspace content available to the bot.

  - name: gitlab
    kind: gitlab
    entities:
      - gitlab.project
    config:
      instance: main
    description: GitLab projects visible to the configured plugin instance.

  - name: jira
    connector: jira
    kind: jira
    entities:
      - jira.issue
      - jira.project
    description: Jira issues visible to the configured connector.

  - name: local-docs
    kind: filesystem
    entities:
      - file.document
    description: Local markdown and text files in this example.
    path: .
    include: ["*.md", "*.txt"]

  - name: web_search
    kind: web_search
    entities:
      - web.search_result
    description: Public web search results.

daemon:
  listeners:
    - name: control
      type: http
      addr: agentsdk-local.sock
      auth:
        mode: local_socket

  channels:
    - name: local
      type: direct
      listener: control
      session: slack-main
      access:
        mode: open

    - name: slack-main
      type: slack
      connector: slack-bot
      session: slack-main
      access:
        mode: open
        allow_kinds: [dm, mention, thread_reply]
        default_trust: public
        sharing: strict

---
kind: session
name: slack-main
agent: slack_bot

---
kind: agent
name: slack_bot
model: openai/gpt-5.5
turns:
  max_steps: 50
tools:
  - channel_send
  - datasource_search
  - datasource_get
  - datasource_relation
  - datasource_batch_get
context:
  - identity.current
  - datasource.catalog
  - datasource.detected
datasources:
  - slack-bot
  - gitlab
  - jira
  - local-docs
  - web_search
system: |
  You are a helpful Slack assistant. Keep replies concise and format them with
  standard Markdown. Use channel_send only for useful intermediate updates in
  long-running turns. Use datasource_search with entity filters when you need to
  search Slack users, Slack channels, Slack messages, GitLab projects, Jira
  issues, Jira projects, local documentation files (`file.document`), or public
  web results (`web.search_result`). Use datasource_get when you need a
  specific datasource record by id. Use
  datasource_relation for exact relationships such as Slack channel members
  (`slack.channel` relation `members`); only use Slack message search for
  observed or inferred participants.
