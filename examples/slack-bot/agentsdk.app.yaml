kind: app
name: slack-bot
description: Minimal Slack daemon app for the rewrite runtime.
default_agent:
  name: slack_bot
distribution:
  name: slack-bot
  title: Slack Bot
  build:
    assets:
      - agentsdk.app.yaml
      - README.md
      - knowledge/**/*
    docker:
      image: slack-bot
      tags: [latest]

identity:
  groups:
    - id: slack-bot-admin
      trust: operator
    - id: slack-bot-users
      trust: internal
    - id: anonymous
      trust: public
  rules:
    - match:
        provider: slack
        resolution: resolved
      groups: [slack-bot-users]
    - match:
        provider: slack
        provider_id: U03HY52RQLV
        resolution: resolved
      groups: [slack-bot-admin]
    - match:
        provider: slack
        resolution: unresolved
      groups: [anonymous]

plugins:
  - kind: identity
  - kind: slack
  - kind: gitlab
    instance: main
    config:
      base_url: https://gitlab.example.com
  - kind: jira
  - kind: web

connectors:
  slack-bot:
    kind: slack
  jira:
    kind: jira

datasource:
  index:
    concurrency: 4
    freshness: 15m
  datasources:
    - name: slack-bot
      connector: slack-bot
      kind: slack
      entities:
        - slack.user
        - slack.channel
        - slack.message
      description: Slack workspace content available to the bot.

    - name: gitlab
      kind: gitlab
      index:
        enabled: true
        freshness: 15m
      entities:
        - gitlab.project
        - gitlab.merge_request
        - gitlab.merge_request_diff
        - gitlab.merge_request_note
        - gitlab.pipeline
        - gitlab.user
        - gitlab.group
      config:
        instance: main
      description: GitLab projects and merge request review data visible to the configured plugin instance.

    - name: jira
      connector: jira
      kind: jira
      entities:
        - jira.issue
        - jira.project
      description: Jira issues visible to the configured connector.

    - name: local-docs
      kind: filesystem
      entities:
        - file.document
      description: Local markdown and text files in this example.
      path: .
      include: ["*.md", "*.txt"]

    - name: web_search
      kind: web_search
      entities:
        - web.search_result
      description: Public web search results.

daemon:
  listeners:
    - name: control
      type: http
      addr: agentsdk-local.sock
      auth:
        mode: local_socket

  channels:
    - name: local
      type: direct
      listener: control
      session: slack-main
      access:
        mode: open

    - name: slack-main
      type: slack
      connector: slack-bot
      session: slack-main
      access:
        mode: open
        allow_kinds: [dm, mention, thread_reply]
        default_trust: public
        sharing: strict

---
kind: session
name: slack-main
agent: slack_bot

---
kind: agent
name: slack_bot
model: openai/gpt-5.5
turns:
  max_steps: 50
tools:
  - channel_send
  - datasource_search
  - datasource_list
  - datasource_get
  - datasource_relation
  - datasource_batch_get
context:
  - identity.current
  - datasource.catalog
  - datasource.detected
datasources:
  - slack-bot
  - gitlab
  - jira
  - local-docs
  - web_search
system: |
  You are a helpful Slack assistant. Keep replies concise and format them with
  standard Markdown. Use channel_send only for useful intermediate updates in
  long-running turns. Use datasource_list when you need to enumerate GitLab
  projects, GitLab users, or GitLab groups. Use datasource_search with entity
  filters when you need to search Slack users, Slack channels, Slack messages,
  GitLab projects, GitLab users, GitLab groups, Jira issues, Jira projects,
  local documentation files (`file.document`), or public web results
  (`web.search_result`). Use datasource_get when you need a specific datasource
  record by id. Use
  datasource_relation for exact relationships such as Slack channel members
  (`slack.channel` relation `members`) or GitLab project users/groups, user
  groups, and group projects; only use Slack message search for observed or
  inferred participants.
