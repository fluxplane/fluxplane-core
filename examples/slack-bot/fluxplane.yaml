kind: app
name: slack-bot
description: Minimal Slack daemon app for the rewrite runtime.
defaults:
  profile: dev
  agent: slack_bot
  model: smart_model
profiles:
  dev:
    description: Local development with sqlite events and in-memory data.
  prod:
    description: Production deployment with durable runtime backends.
models:
  available:
    - provider: openrouter
      model: openai/gpt-5.5
      aliases: [smart_model, gpt5]
      params:
        effort: medium
distribution:
  name: slack-bot
  title: Slack Bot
  deploy:
    model: smart_model
  build:
    assets:
      - fluxplane.yaml
      - README.md
      - knowledge/**/*
    docker:
      image: slack-bot
      tags: [latest]

identity:
  groups:
    - id: slack-bot-admin
      trust: operator
    - id: slack-bot-users
      trust: internal
    - id: anonymous
      trust: public
  rules:
    - match:
        provider: slack
        resolution: resolved
      groups: [slack-bot-users]
    - match:
        provider: slack
        provider_id: U03HY52RQLV
        resolution: resolved
      groups: [slack-bot-admin]
    - match:
        provider: slack
        resolution: unresolved
      groups: [anonymous]

plugins:
  identity: ~
  slack-bot:
    kind: slack
    auth:
      method: token
  main:
    kind: gitlab
    base_url: https://gitlab.example.com
  jira:
    auth:
      method: oauth2
  confluence:
    auth:
      method: oauth2
  web: ~

datasource:
  index:
    concurrency: 4
    freshness: 15m
  datasources:
    - name: slack-bot
      kind: slack
      config:
        instance: slack-bot
      entities:
        - slack.user
        - slack.channel
        - slack.message
        - slack.thread_message
      description: Slack workspace content available to the bot.

    - name: gitlab
      kind: gitlab
      index:
        enabled: true
        freshness: 15m
      entities:
        - gitlab.project
        - gitlab.merge_request
        - gitlab.merge_request_diff
        - gitlab.merge_request_note
        - gitlab.pipeline
        - gitlab.user
        - gitlab.group
        - gitlab.user_membership
      config:
        instance: main
      description: GitLab projects and merge request review data visible to the configured plugin instance.

    - name: jira
      kind: jira
      entities:
        - jira.issue
        - jira.project
      description: Jira issues visible to the configured native plugin instance.

    - name: confluence
      kind: confluence
      entities:
        - confluence.page
        - confluence.space
      description: Confluence pages and spaces visible to the configured native plugin instance.

    - name: local-docs
      kind: filesystem
      entities:
        - file.document
      description: Local markdown and text files in this example.
      path: .
      include: ["*.md", "*.txt"]

    - name: web_search
      kind: web_search
      entities:
        - web.search_result
      description: Public web search results.

daemon:
  listeners:
    - name: control
      type: http
      addr: coder-local.sock
      auth:
        mode: local_socket

  channels:
    - name: local
      type: direct
      listener: control
      session: slack-main
      access:
        mode: open

    - name: slack-main
      type: slack
      instance: slack-bot
      session: slack-main
      access:
        mode: open
        allow_kinds: [dm, mention, thread_reply]
        default_trust: public
        sharing: strict

---
kind: runtime
profile: prod
data:
  store:
    kind: mysql
    dsn_env: FLUXPLANE_DATASTORE_MYSQL_DSN
events:
  store:
    kind: nats
    dsn_env: FLUXPLANE_EVENTSTORE_NATS_DSN
    stream: FLUXPLANE_EVENTS
    subject: fluxplane.events.log
    create_stream: true

---
kind: session
name: slack-main
agent: slack_bot

---
kind: agent
name: slack_bot
model: openai/gpt-5.5
turns:
  max_steps: 50
uses:
  - channel
  - datasource
  - identity
system: |
  You are a helpful Slack assistant. Keep replies concise and format them with
  standard Markdown. Use channel_send only for useful intermediate updates in
  long-running turns. Use datasource_list when you need to enumerate GitLab
  projects, GitLab users, or visible GitLab groups. Use datasource_search with
  entity filters when you need to search Slack users, Slack channels, Slack
  messages, Slack thread messages, GitLab projects, GitLab users, GitLab
  groups, Jira issues, Jira projects, Confluence pages, Confluence spaces,
  local documentation files (`file.document`), or public web results
  (`web.search_result`). Use
  datasource_get when you need a specific datasource record by id. Use
  datasource_relation for exact relationships such as Slack channel members
  (`slack.channel` relation `members`) and Slack message threads
  (`slack.message` relation `thread_messages`) or GitLab project users/groups,
  user memberships, user groups/projects, group hierarchy, group users, and
  group projects; only use Slack message search for observed or inferred
  participants.
