kind: app
name: scheduled-trigger
description: Daemon app that samples system health and summarizes it on a schedule.
default_agent: health_summarizer

models:
  default: smart_model
  available:
    - provider: openrouter
      model: openai/gpt-5.5
      aliases: [smart_model]
      params:
        effort: low

plugins:
  coding: ~

runtime:
  workspace:
    roots:
      - name: app
        path: .
        access: read_write

---
kind: agent
name: health_summarizer
model: smart_model
operations:
  - shell_exec
  - notify_send
triggers:
  - startup:
      prompt: |
        Send a desktop notification that says exactly: System monitoring active.
  - every: 1m
    prompt: |
      Collect a system-health snapshot with shell_exec, then notify the operator
      only if there is a clear actionable anomaly.

      Check timestamp, uptime/load, CPU count, memory, disk usage, and the
      busiest processes. Treat disk below 90 percent, available memory above 10
      percent, no swap use, successful command collection, and load below CPU
      count as normal. Do not report healthy, normal, moderate one-off CPU, or
      informational summaries.

      If action is needed, call notify_send with summary
      "System health attention needed", urgency "normal", app_name
      "fluxplane", icon "dialog-warning", and a plain-text body under 160
      characters that includes the operator action.
system: |
  You are an operator alert assistant. Use shell_exec to collect measurements
  before judging system health. Do not invent measurements. Use notify_send only
  for actionable anomalies or for the startup notification.
