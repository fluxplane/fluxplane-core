version: "3"

tasks:
  default:
    desc: List available tasks.
    cmds:
      - task --list

  install:
    desc: Install the fluxplane binary on this machine.
    cmds:
      - go run ./cmd/build/main.go --install apps/fluxplane

  hooks:install:
    desc: Configure this clone to use the tracked Git hooks.
    cmds:
      - git config core.hooksPath .githooks

  build:
    desc: Cross-compile the fluxplane binary into bin/.
    cmds:
      - mkdir -p bin
      - go run ./cmd/build/main.go apps/fluxplane

  index:
    desc: Build or update the root app semantic index for local markdown docs.
    cmds:
      - go run ./cmd/fluxplane datasource index build "{{.TASKFILE_DIR}}" --datasource local-docs --entity file.document --full

  verify:
    desc: Run the rewrite quality gate.
    cmds:
      - task: fmt:check
      - task: mod:check
      - task: whitespace:check
      - task: vet
      - task: lint
      - task: test
      - task: quality:go

  security:scan:
    desc: Scan working tree and Git history for secrets and banned keywords.
    cmds:
      - bash scripts/security-scan.sh full

  fmt:check:
    desc: Fail when Go files are not gofmt formatted.
    cmds:
      - |
        files="$(gofmt -l .)"
        if [ -n "$files" ]; then
          printf 'gofmt needed:\n%s\n' "$files"
          exit 1
        fi

  mod:check:
    desc: Fail when go.mod or go.sum need tidying.
    cmds:
      - go mod tidy -diff

  whitespace:check:
    desc: Fail on whitespace errors in the git diff.
    cmds:
      - git diff --check

  vet:
    desc: Run go vet.
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint.
    cmds:
      - golangci-lint run ./...

  test:
    desc: Run engine tests.
    cmds:
      - go test -timeout=30s ./...

  quality:metrics:
    desc: Print non-blocking code quality metrics for refactoring guidance.
    cmds:
      - mkdir -p .cache/quality
      - go test -timeout=30s -coverprofile=.cache/quality/coverage.out ./...
      - go tool cover -func=.cache/quality/coverage.out | tail -n 1
      - |
        if command -v gocyclo >/dev/null 2>&1; then
          printf '\nTop cyclomatic complexity:\n'
          gocyclo -top 20 -ignore '(^|/)\.cache/|(^|/)bin/' .
        else
          printf '\nSkipping gocyclo: not installed. Run: go install github.com/fzipp/gocyclo/cmd/gocyclo@latest\n'
        fi
      - |
        if command -v gocognit >/dev/null 2>&1; then
          printf '\nTop cognitive complexity:\n'
          gocognit -top 20 .
        else
          printf '\nSkipping gocognit: not installed. Run: go install github.com/uudashr/gocognit/cmd/gocognit@latest\n'
        fi

  quality:go:
    desc: Run the codegate Go quality gate.
    cmds:
      - go run github.com/fluxplane/codegate/cmd/codegate@v1.1.0 --root . --language go --format json assess --gate all --rules engine-architecture.rules.json --fail-on boundary,effects,unknown --view summary

  quality:go:review:
    desc: Print compact codegate Go review evidence.
    cmds:
      - go run github.com/fluxplane/codegate/cmd/codegate@v1.1.0 --root . --language go --format json assess --gate all --rules engine-architecture.rules.json --view compact --suggestions 10

  quality:go:full:
    desc: Print full codegate Go review evidence.
    cmds:
      - go run github.com/fluxplane/codegate/cmd/codegate@v1.1.0 --root . --language go --format json assess --gate all --rules engine-architecture.rules.json --view full --suggestions 20
