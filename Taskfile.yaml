version: "3"

env:
  GOCACHE: "{{.TASKFILE_DIR}}/.cache/go-build"
  GOLANGCI_LINT_CACHE: "{{.TASKFILE_DIR}}/.cache/golangci-lint"

tasks:
  default:
    desc: List available tasks.
    cmds:
      - task --list

  install:
    desc: Install the coder binary on this machine.
    cmds:
      - go run ./cmd/build/main.go --install apps/coder

  hooks:install:
    desc: Configure this clone to use the tracked Git hooks.
    cmds:
      - git config core.hooksPath .githooks

  build:
    desc: Cross-compile the coder binary into bin/.
    env:
      GOTMPDIR: "{{.TASKFILE_DIR}}/.cache/go-tmp"
    cmds:
      - mkdir -p bin .cache/go-build .cache/go-tmp
      - go run ./cmd/build/main.go apps/coder

  index:
    desc: Build or update the root app semantic index for local markdown docs.
    cmds:
      - go run ./cmd/coder datasource index build . --datasource local-docs --entity file.document --full

  verify:
    desc: Run the rewrite quality gate.
    cmds:
      - task: fmt:check
      - task: mod:check
      - task: whitespace:check
      - task: vet
      - task: lint
      - task: test
      - task: arch:check

  security:scan:
    desc: Scan working tree and Git history for secrets and banned keywords.
    cmds:
      - bash scripts/security-scan.sh full

  fmt:check:
    desc: Fail when Go files are not gofmt formatted.
    cmds:
      - |
        files="$(gofmt -l .)"
        if [ -n "$files" ]; then
          printf 'gofmt needed:\n%s\n' "$files"
          exit 1
        fi

  mod:check:
    desc: Fail when go.mod or go.sum need tidying.
    cmds:
      - go mod tidy -diff

  whitespace:check:
    desc: Fail on whitespace errors in the git diff.
    cmds:
      - git diff --check

  vet:
    desc: Run go vet.
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint.
    cmds:
      - golangci-lint run ./...

  test:
    desc: Run rewrite tests.
    cmds:
      - go test -timeout=30s ./...

  coder:live-test:
    desc: 'Live-test coder with the Codex provider and debug event output. Usage: task coder:live-test -- "prompt"'
    env:
      CODER_LIVE_TEST_PROMPT: "{{.CLI_ARGS}}"
      XDG_STATE_HOME: "{{.TASKFILE_DIR}}/.cache/coder-live-state"
    cmds:
      - |
        if [ -z "$CODER_LIVE_TEST_PROMPT" ]; then
          printf 'usage: task coder:live-test -- "prompt describing the scenario"\n' >&2
          exit 2
        fi
        mkdir -p "$XDG_STATE_HOME"
        go run ./cmd/coder --provider codex --model gpt-5.5 --yolo --debug --input "$CODER_LIVE_TEST_PROMPT"

  quality:metrics:
    desc: Print non-blocking code quality metrics for refactoring guidance.
    cmds:
      - mkdir -p .cache/quality
      - go test -timeout=30s -coverprofile=.cache/quality/coverage.out ./...
      - go tool cover -func=.cache/quality/coverage.out | tail -n 1
      - |
        if command -v gocyclo >/dev/null 2>&1; then
          printf '\nTop cyclomatic complexity:\n'
          gocyclo -top 20 -ignore '(^|/)\.cache/|(^|/)bin/' .
        else
          printf '\nSkipping gocyclo: not installed. Run: go install github.com/fzipp/gocyclo/cmd/gocyclo@latest\n'
        fi
      - |
        if command -v gocognit >/dev/null 2>&1; then
          printf '\nTop cognitive complexity:\n'
          gocognit -top 20 .
        else
          printf '\nSkipping gocognit: not installed. Run: go install github.com/uudashr/gocognit/cmd/gocognit@latest\n'
        fi

  arch:check:
    desc: Fail on architecture import-direction violations.
    cmds:
      - go run ./apps/archreport -fail

  arch:report:
    desc: Print the architecture report.
    cmds:
      - go run ./apps/archreport

  arch:render:
    desc: Render architecture graph sources into .agents/architecture.
    cmds:
      - mkdir -p .agents/architecture
      - go run ./apps/archreport -format mermaid -out .agents/architecture/import-graph.mmd
      - go run ./apps/archreport -format dot -out .agents/architecture/import-graph.dot
